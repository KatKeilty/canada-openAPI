services:
  jupyter:
    build:
      context: .
      dockerfile: docker/jupyter/dockerfile
    ports:
      - "8889:8888"
    volumes:
      - ./src:/app/src
      - ./notebooks:/app/notebooks
      - ./data:/app/data
      - ./examples:/app/examples
    environment:
      - JUPYTER_ENABLE_LAB=yes
      - JUPYTER_TOKEN=${JUPYTER_TOKEN}
    container_name: canadaopenapi-jupyter